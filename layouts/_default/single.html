{{ define "main" }}
    <article>
        <div class="post-header">
            <h2>{{ .Title }}</h2>
            {{ if .Date }}
                <div class="post-meta">
                    <time datetime="{{ .Date.Format "2006-01-02" }}">
                        发布于 {{ .Date.Format "2006-01-02" }}
                    </time>
                </div>
            {{ end }}
        </div>
        {{ .Content }}
    </article>
{{ end }}
