{{ define "main" }}
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
        <article>
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            <p>{{ .Summary }}</p>
            {{ if .Truncated }}
                <a href="{{ .RelPermalink }}">继续阅读 →</a>
            {{ end }}
        </article>
    {{ end }}
{{ end }}
